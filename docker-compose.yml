services:
  db:
    image: postgres:18-alpine
    container_name: plateforme_formateurs_db
    environment:
      POSTGRES_USER: formateurs
      POSTGRES_PASSWORD: formateurs
      POSTGRES_DB: plateforme_formateurs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: